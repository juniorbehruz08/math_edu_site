<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inequalities Quiz</title>
  <style>
    :root{--bg:#0f172a;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--success:#22c55e;--danger:#ef4444}
    *{box-sizing:border-box}
    body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071033 0%, #081126 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:900px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    h1{font-size:20px;margin:0}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6)}
    .question{font-size:18px;margin-bottom:12px}
    .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:12px}
    label.option{background:#071330;border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
    input[type=radio]{width:18px;height:18px}
    .controls{display:flex;gap:8px;align-items:center}
    button{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:#04243a;cursor:pointer;font-weight:600}
    button:disabled{background:var(--muted);cursor:not-allowed}
    button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.15)}
    .result{padding:10px;margin-top:8px;border-radius:8px;font-weight:700}
    .result.ok{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.12)}
    .result.bad{background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.06)}
    footer{margin-top:12px;color:var(--muted);font-size:13px}
    sup{font-size: 0.6em; vertical-align: super;}
    @media(max-width:520px){.options{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Inequalities</h1>
      <div class="meta">10 linear and 10 quadratic inequality questions</div>
    </header>

    <div class="card" id="card"></div>

    <footer>
      Tip: Pay attention to the inequality signs and solve for intervals with integer boundaries.
    </footer>
  </div>

  <script>
    const card = document.getElementById('card');
    let QUESTIONS = [], idx = 0, score = 0;
    const totalQuestions = 20;

    function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
    function fmt(n) { return String(Math.round(n)); }

    function formatInterval(a, b, leftOpen, rightOpen) {
      const left = leftOpen ? '(' : '[';
      const right = rightOpen ? ')' : ']';
      return a === -Infinity && b === Infinity ? '(-∞, ∞)' :
             a === -Infinity ? `(-∞, ${fmt(b)}${right}` :
             b === Infinity ? `${left}${fmt(a)}, ∞)` :
             `${left}${fmt(a)}, ${fmt(b)}${right}`;
    }

    function makeLinearInequality() {
      const a = randInt(-10, 10) || 1;
      const boundary = randInt(-10, 10);
      const b = -a * boundary;
      const signs = ['<', '>', '≤', '≥'];
      const sign = signs[randInt(0, 3)];
      let expr = `${a}x ${b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`} ${sign} 0`;
      let answer;

      if (sign === '<') {
        answer = a > 0 ? formatInterval(-Infinity, boundary, true, true) : formatInterval(boundary, Infinity, true, true);
      } else if (sign === '>') {
        answer = a > 0 ? formatInterval(boundary, Infinity, true, true) : formatInterval(-Infinity, boundary, true, true);
      } else if (sign === '≤') {
        answer = a > 0 ? formatInterval(-Infinity, boundary, true, false) : formatInterval(boundary, Infinity, false, true);
      } else {
        answer = a > 0 ? formatInterval(boundary, Infinity, false, true) : formatInterval(-Infinity, boundary, true, false);
      }

      const options = new Set([answer]);
      while (options.size < 4) {
        const shift = randInt(-5, 5) || 1;
        const fakeBound = boundary + shift;
        const fakeOpen = Math.random() < 0.5;
        const fake = Math.random() < 0.5 ?
          formatInterval(fakeBound, Infinity, fakeOpen, true) :
          formatInterval(-Infinity, fakeBound, true, fakeOpen);
        if (fake !== answer) options.add(fake);
      }

      return { expr, answer, options: shuffle(Array.from(options)) };
    }

    function makeQuadraticInequality() {
      const a = randInt(-5, 5) || 1;
      let root1 = randInt(-10, 10);
      let root2 = randInt(-10, 10);
      if (root1 === root2) root2 += 1;
      const sortedRoots = [Math.min(root1, root2), Math.max(root1, root2)];
      const b = -a * (sortedRoots[0] + sortedRoots[1]);
      const c = a * sortedRoots[0] * sortedRoots[1];
      const signs = ['<', '>', '≤', '≥'];
      const sign = signs[randInt(0, 3)];
      let expr = `${a}x<sup>2</sup> ${b >= 0 ? `+ ${b}` : `- ${Math.abs(b)}`}x ${c >= 0 ? `+ ${c}` : `- ${Math.abs(c)}`} ${sign} 0`;
      let answer;

      if (sign === '<') {
        answer = a > 0 ? formatInterval(sortedRoots[0], sortedRoots[1], true, true) :
                         `(-∞, ${fmt(sortedRoots[0])}) ∪ (${fmt(sortedRoots[1])}, ∞)`;
      } else if (sign === '>') {
        answer = a > 0 ? `(-∞, ${fmt(sortedRoots[0])}) ∪ (${fmt(sortedRoots[1])}, ∞)` :
                         formatInterval(sortedRoots[0], sortedRoots[1], true, true);
      } else if (sign === '≤') {
        answer = a > 0 ? formatInterval(sortedRoots[0], sortedRoots[1], false, false) :
                         `(-∞, ${fmt(sortedRoots[0])}] ∪ [${fmt(sortedRoots[1])}, ∞)`;
      } else {
        answer = a > 0 ? `(-∞, ${fmt(sortedRoots[0])}] ∪ [${fmt(sortedRoots[1])}, ∞)` :
                         formatInterval(sortedRoots[0], sortedRoots[1], false, false);
      }

      const options = new Set([answer]);
      while (options.size < 4) {
        const shift = randInt(-3, 3) || 1;
        const fakeRoot1 = sortedRoots[0] + shift;
        const fakeRoot2 = sortedRoots[1] + shift;
        const fakeOpen = Math.random() < 0.5;
        const fake = Math.random() < 0.5 ?
          formatInterval(fakeRoot1, fakeRoot2, fakeOpen, fakeOpen) :
          `(-∞, ${fmt(fakeRoot1)}) ∪ (${fmt(fakeRoot2)}, ∞)`;
        if (fake !== answer) options.add(fake);
      }

      return { expr, answer, options: shuffle(Array.from(options)) };
    }

    function startQuiz() {
      idx = 0; score = 0;
      QUESTIONS = [];
      for (let i = 0; i < totalQuestions; i++) {
        if (i < 10) {
          QUESTIONS.push(makeLinearInequality());
        } else {
          QUESTIONS.push(makeQuadraticInequality());
        }
      }
      render();
    }

    function render() {
      const q = QUESTIONS[idx];
      card.innerHTML = `
        <div class="question">Q${idx + 1}: Solve <strong>${q.expr}</strong></div>
        <div class="options">${q.options.map(o => `<label class="option"><input type="radio" name="opt" value="${o}"> ${o}</label>`).join('')}</div>
        <div class="controls">
          <button id="check">Check</button>
          <button class="secondary" id="skipBtn">Skip</button>
          <button class="secondary"><a style="text-decoration:none; color: #60a5fa" href="{% if back_url == 'inequalities' %}{% url 'inequalities' %}{% else %}{% url 'equalities_inequalities' %}{% endif %}">Exit</a></button>
          <div style="flex:1"></div>
          <div class="meta">${idx + 1}/${totalQuestions}</div>
        </div>
        <div id="feedback"></div>
      `;
      document.getElementById('check').addEventListener('click', () => check(q));
      document.getElementById('skipBtn').addEventListener('click', next);
    }

    function check(q) {
      const sel = document.querySelector('input[name=opt]:checked');
      const fb = document.getElementById('feedback');
      document.getElementById('check').disabled = true;
      if (!sel) { fb.innerHTML = `<div class="result bad">⚠️ Please select an option.</div>`; return; }
      const val = sel.value;
      if (val === q.answer) {
        score++;
        fb.innerHTML = `<div class="result ok">✅ Correct!</div>`;
        document.getElementById('skipBtn').removeEventListener('click', next);
        document.getElementById('skipBtn').disabled = true;
        setTimeout(next, 800);
      } else {
        fb.innerHTML = `<div class="result bad">❌ Incorrect. Correct: ${q.answer}</div>`;
        document.getElementById('skipBtn').textContent = 'Next';
        document.getElementById('skipBtn').id = 'nextBtn';
        document.getElementById('nextBtn').addEventListener('click', next);
      }
    }

    function next() {
      if (idx < totalQuestions - 1) { idx++; render(); }
      else showResults();
    }

    function showResults() {
      const perc = Math.round((score / totalQuestions) * 100);
      card.innerHTML = `
        <div class="question">Test completed!</div>
        <div class="result ok" style="text-align:center;font-size:18px;margin-bottom:12px;">
          Your result: ${score}/${totalQuestions} (${perc}%)
        </div>
        <div style="text-align:center;">${perc >= 80 ? "Excellent! 👍" : perc >= 50 ? "Good, keep practising! 😊" : "Keep practicing — you got this! 📚"}</div>
        <div class="controls" style="justify-content:center;margin-top:12px;">
          <button id="restart">Retry</button>
          <button class="secondary"><a style="text-decoration:none; color: #60a5fa" href="{% if back_url == 'inequalities' %}{% url 'inequalities' %}{% else %}{% url 'equalities_inequalities' %}{% endif %}">Exit</a></button>
        </div>
      `;
      document.getElementById('restart').addEventListener('click', startQuiz);
    }

    startQuiz();
  </script>
</body>
</html>
