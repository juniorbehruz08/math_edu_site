<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fraction Arithmetic Quiz</title>
  <style>
    :root{--bg:#0f172a;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--success:#22c55e;--danger:#ef4444}
    *{box-sizing:border-box}
    body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071033 0%, #081126 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:900px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    h1{font-size:20px;margin:0}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6)}
    .question{font-size:18px;margin-bottom:12px; display: flex; align-items: center; gap: 8px;}
    .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:12px}
    label.option{background:#071330;border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
    input[type=radio]{width:18px;height:18px;accent-color:var(--accent)}
    .controls{display:flex;gap:8px;align-items:center}
    button{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:#04243a;cursor:pointer;font-weight:600}
    button:disabled{background:var(--muted);color:rgba(0,0,0,0.5);cursor:not-allowed}
    button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.15)}
    .result{padding:10px;margin-top:8px;border-radius:8px;font-weight:700}
    .result.ok{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.12)}
    .result.bad{background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.06)}
    .correct-list{margin-top:10px;padding:10px;background:rgba(255,255,255,0.02);border-radius:8px;color:var(--muted); display: flex; align-items: center; gap: 8px;}
    footer{margin-top:12px;color:var(--muted);font-size:13px}

    /* --- NEW CSS FOR VERTICAL FRACTIONS --- */
    .fraction {
        display: inline-flex;
        flex-direction: column;
        text-align: center;
        vertical-align: middle;
        margin: 0 4px;
    }
    .numerator {
        border-bottom: 1px solid currentColor;
        padding: 0 4px;
    }
    .denominator {
        padding: 0 4px;
    }
    /* --- END NEW CSS --- */

    @media(max-width:520px){.options{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Fraction Arithmetic Quiz</h1>
      <div class="meta">20 random questions · single-correct</div>
    </header>

    <div class="card" id="card">
      </div>

    <footer>
      Tip: you must select the correct option. After a wrong answer the correct option is shown below.
    </footer>
  </div>

  <script>
    const card = document.getElementById('card');
    let QUESTIONS = [];
    let idx = 0;
    let score = 0;
    const totalQuestions = 20;

    // --- Helper Functions for Fractions ---

    function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

    function simplifyFraction(num, den) {
      if (den === 0) return { num: 'Undefined', den: 1 };
      if (num === 0) return { num: 0, den: 1 };
      const commonDivisor = gcd(Math.abs(num), Math.abs(den));
      let simplifiedNum = num / commonDivisor;
      let simplifiedDen = den / commonDivisor;
      if (simplifiedDen < 0) {
          simplifiedNum = -simplifiedNum;
          simplifiedDen = -simplifiedDen;
      }
      return { num: simplifiedNum, den: simplifiedDen };
    }

    // --- MODIFIED FUNCTIONS: One for logic (string), one for display (HTML) ---

    // Returns a simple string like "5/4" for logic and radio button values
    function formatFractionString({ num, den }) {
        if (den === 1 || num === 0) return num.toString();
        return `${num}/${den}`;
    }

    // Returns an HTML string for vertical display
    function formatFractionHTML({ num, den }) {
        if (den === 1 || num === 0) return `<span>${num}</span>`;
        return `<div class="fraction">
                  <span class="numerator">${num}</span>
                  <span class="denominator">${den}</span>
                </div>`;
    }

    function parseFractionString(str) {
        if (!str.includes('/')) {
            return { num: parseInt(str), den: 1 };
        }
        const parts = str.split('/');
        return { num: parseInt(parts[0]), den: parseInt(parts[1]) };
    }

    function makeQuestion() {
      const operations = ['+', '−', '×', '÷']; // Using math symbols for display
      const op = operations[randInt(0, 3)];

      let f1_obj = simplifyFraction(randInt(1, 10), randInt(2, 10));
      let f2_obj = simplifyFraction(randInt(1, 10), randInt(2, 10));

      if (op === '÷') {
        f2_obj.num = randInt(1, 10); // Ensure no division by zero
        f2_obj = simplifyFraction(f2_obj.num, f2_obj.den);
      }

      let resultNum, resultDen;
      switch (op) {
        case '+':
        case '−': // Logic is the same for subtraction, just signs differ
          resultNum = (op === '+')
            ? f1_obj.num * f2_obj.den + f2_obj.num * f1_obj.den
            : f1_obj.num * f2_obj.den - f2_obj.num * f1_obj.den;
          resultDen = f1_obj.den * f2_obj.den;
          break;
        case '×':
          resultNum = f1_obj.num * f2_obj.num;
          resultDen = f1_obj.den * f2_obj.den;
          break;
        case '÷':
          resultNum = f1_obj.num * f2_obj.den;
          resultDen = f1_obj.den * f2_obj.num;
          break;
      }

      const simplifiedResult = simplifyFraction(resultNum, resultDen);
      const correctAnswer = formatFractionString(simplifiedResult);

      const options = new Set([correctAnswer]);
      while (options.size < 4) {
          const randomDistractor = simplifyFraction(randInt(-20, 20), randInt(2, 20));
          options.add(formatFractionString(randomDistractor));
      }

      return {
        f1: f1_obj,
        f2: f2_obj,
        op: op,
        correct: correctAnswer,
        options: shuffle(Array.from(options))
      };
    }

    function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

    function startQuiz() {
      idx = 0;
      score = 0;
      QUESTIONS = Array.from({ length: totalQuestions }, () => makeQuestion());
      render();
    }

    // --- MODIFIED RENDER FUNCTION ---
    function render() {
      const q = QUESTIONS[idx];
      const questionHTML = `What is ${formatFractionHTML(q.f1)} ${q.op} ${formatFractionHTML(q.f2)}?`;

      card.innerHTML = `
        <div class="question">Q${idx + 1}: <strong>${questionHTML}</strong></div>
        <div class="meta">Choose the correct answer</div>
        <div class="options">${q.options.map((opt_string, i) => `
          <label class="option">
            <input type="radio" name="option" value="${opt_string}" id="opt${i}">
            <label for="opt${i}">${formatFractionHTML(parseFractionString(opt_string))}</label>
          </label>`).join('')}
        </div>
        <div class="controls">
          <button id="check" disabled>Check</button>
          <button class="secondary" id="nextBtn">Skip</button>
          <button class="secondary"><a style="text-decoration:none; color: #60a5fa" href="{% url 'fractions' %}">Exit</a></button>
          <div style="flex:1"></div>
          <div class="meta">${idx + 1}/${totalQuestions}</div>
        </div>
        <div id="feedback"></div>
      `;

      const checkBtn = document.getElementById('check');
      card.querySelectorAll('input[name="option"]').forEach(radio => {
          radio.addEventListener('change', () => { checkBtn.disabled = false; });
      });

      checkBtn.addEventListener('click', () => check(q));
      document.getElementById('nextBtn').addEventListener('click', () => next());
    }

    // --- MODIFIED CHECK FUNCTION ---
    function check(q) {
      const checkBtn = document.getElementById('check');
      const nextBtn = document.getElementById('nextBtn');
      const selectedInput = card.querySelector('input[name="option"]:checked');

      if (!selectedInput) return;

      const selectedValue = selectedInput.value;
      const ok = (selectedValue === q.correct);

      const fb = document.getElementById('feedback');
      checkBtn.disabled = true;
      nextBtn.textContent = 'Next question';

      card.querySelectorAll('input[name="option"]').forEach(radio => radio.disabled = true);

      const correctAnswerHTML = formatFractionHTML(parseFractionString(q.correct));
      if (ok) {
        score++;
        fb.innerHTML = `<div class="result ok">✅ Correct!</div>`;
        setTimeout(next, 1200);
      } else {
        fb.innerHTML = `<div class="result bad">❌ Incorrect — the correct answer is:</div>
                        <div class="correct-list">${correctAnswerHTML}</div>`;
      }
    }

    function next() {
      if (idx < totalQuestions - 1) {
        idx++;
        render();
      } else {
        showResults();
      }
    }

    function showResults() {
      const percentage = Math.round((score / totalQuestions) * 100);
      let message = '';
      if (percentage >= 80) message = "Excellent work! 👍";
      else if (percentage >= 50) message = "Good result! 😊";
      else message = "You should practice more. 📚";

      card.innerHTML = `
        <div class="question">Test completed!</div>
        <div class="result ok" style="text-align:center; font-size: 18px; margin-bottom: 12px;">
          Your result: ${score} / ${totalQuestions} (${percentage}%)
        </div>
        <div style="text-align:center; font-size: 16px; margin-bottom: 20px;">${message}</div>
        <div class="controls" style="justify-content:center;">
          <button id="restart">Retry</button>
          <button><a style="text-decoration: none; color:black;" href="{% url 'fractions' %}">Exit</a></button>
        </div>
      `;
      document.getElementById('restart').addEventListener('click', startQuiz);
    }

    startQuiz();
  </script>
</body>
</html>
