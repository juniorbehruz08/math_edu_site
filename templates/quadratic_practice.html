<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Quadratic Equations Quiz</title>
    <style>
        :root{--bg:#0f172a;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--success:#22c55e;--danger:#ef4444}
        *{box-sizing:border-box}
        body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071033 0%, #081126 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
        .wrap{width:100%;max-width:900px}
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        h1{font-size:20px;margin:0}
        .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6)}
        .question{font-size:18px;margin-bottom:12px}
        .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
        .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-bottom:12px}
        label.option{background:#071330;border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
        input[type=radio]{width:18px;height:18px}
        .controls{display:flex;gap:8px;align-items:center}
        button{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:#04243a;cursor:pointer;font-weight:600}
        button:disabled{background:var(--muted);cursor:not-allowed}
        button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.15)}
        .result{padding:10px;margin-top:8px;border-radius:8px;font-weight:700}
        .result.ok{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.12)}
        .result.bad{background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.06)}
        footer{margin-top:12px;color:var(--muted);font-size:13px;text-align:center}
        sup{font-size: 0.6em; vertical-align: super;}
        sub{font-size: 0.6em; vertical-align: sub;}
        @media(max-width:520px){.options{grid-template-columns:1fr}}
    </style>
</head>
<body>
<div class="wrap">
    <header>
        <h1>Quadratic Equations Quiz</h1>
        <div class="meta">Find the roots for each equation</div>
    </header>

    <div class="card" id="card"></div>

    <footer>
        Tip: Use factoring or the quadratic formula to find the roots.
    </footer>
</div>

<script>
    const card = document.getElementById('card');
    let QUESTIONS = [], idx = 0, score = 0;
    const totalQuestions = 20;

    function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a; }

    function makeQuestion(){
      let x1 = randInt(-9, 9);
      let x2 = randInt(-9, 9);
      if (x1 === x2) x2 += (Math.random() < 0.5 ? 1 : -1);

      let a = randInt(1, 4);
      if (Math.random() < 0.3) a *= -1;

      const b = -a * (x1 + x2);
      const c = a * (x1 * x2);

      let a_term = (a === 1) ? 'x<sup>2</sup>' : (a === -1) ? '-x<sup>2</sup>' : `${a}x<sup>2</sup>`;

      let b_term = '';
      if (b !== 0) {
        if (b === 1) b_term = ' + x';
        else if (b === -1) b_term = ' - x';
        else if (b > 0) b_term = ` + ${b}x`;
        else b_term = ` - ${-b}x`;
      }

      let c_term = '';
      if (c !== 0) {
        if (c > 0) c_term = ` + ${c}`;
        else c_term = ` - ${-c}`;
      }

      let expr = `${a_term}${b_term}${c_term} = 0`;

      const roots = [x1, x2].sort((n1, n2) => n1 - n2);

      // ✅ Correct answer with subscript
      const correct = `x₁ = ${roots[0]}, x₂ = ${roots[1]}`;

      const opts = new Set([correct]);
      while (opts.size < 4) {
        const type = randInt(1, 3);
        let fakeRoots;
        switch(type){
            case 1:
                fakeRoots = [-roots[1], -roots[0]].sort((a,b)=>a-b);
                break;
            case 2:
                if(Math.random() < 0.5) fakeRoots = [-roots[0], roots[1]].sort((a,b)=>a-b);
                else fakeRoots = [roots[0], -roots[1]].sort((a,b)=>a-b);
                break;
            case 3:
            default:
                const shift1 = randInt(1,3) * (Math.random() < 0.5 ? 1 : -1);
                const shift2 = randInt(1,3) * (Math.random() < 0.5 ? 1 : -1);
                fakeRoots = [roots[0] + shift1, roots[1] + shift2].sort((a,b)=>a-b);
                break;
        }

        if (fakeRoots[0] === roots[0] && fakeRoots[1] === roots[1]) continue;

        // ✅ Fake answer with subscript
        const fake = `x₁ = ${fakeRoots[0]}, x₂ = ${fakeRoots[1]}`;
        opts.add(fake);
      }

      const options = shuffle(Array.from(opts));
      return { expr, answer: correct, options };
    }

    function startQuiz(){
      idx=0; score=0;
      QUESTIONS = Array.from({length: totalQuestions}, ()=> makeQuestion());
      render();
    }

    function render(){
      const q = QUESTIONS[idx];
      card.innerHTML = `
        <div class="question">Q${idx+1}: Find the roots of <strong>${q.expr}</strong></div>
        <div class="options">${q.options.map(o=>`<label class="option"><input type="radio" name="opt" value="${o}"> ${o}</label>`).join('')}</div>
        <div class="controls">
          <button id="check">Check</button>
          <button class="secondary" id="skipBtn">Skip</button>
          <button class="secondary"><a style="text-decoration:none; color: #60a5fa" href="{% if back_url == 'quadratic_equations' %}{% url 'quadratic_equations' %}{% else %}{% url 'equalities_inequalities' %}{% endif %}">Exit</a></button>
          <div style="flex:1"></div>
          <div class="meta">${idx+1}/${totalQuestions}</div>
        </div>
        <div id="feedback"></div>
      `;
      document.getElementById('check').addEventListener('click', ()=> check(q));
      document.getElementById('skipBtn').addEventListener('click', next);
    }

    function check(q){
      const sel = document.querySelector('input[name=opt]:checked');
      const fb = document.getElementById('feedback');
      document.getElementById('check').disabled = true;
      document.getElementById('skipBtn').disabled = true;

      if(!sel){
        fb.innerHTML = `<div class="result bad">⚠️ Please select an option.</div>`;
        document.getElementById('check').disabled = false;
        document.getElementById('skipBtn').disabled = false;
        return;
      }
      const val = sel.value;
      if(val === q.answer){
        score++;
        fb.innerHTML = `<div class="result ok">✅ Correct!</div>`;
        setTimeout(next, 900);
      } else {
        fb.innerHTML = `<div class="result bad">❌ Incorrect. The correct answer is: ${q.answer}</div>`;
        const skipBtn = document.getElementById('skipBtn');
        skipBtn.textContent = 'Next';
        skipBtn.disabled = false;
      }
    }

    function next(){
      if(idx < totalQuestions - 1){ idx++; render(); }
      else showResults();
    }

    function showResults(){
      const perc = Math.round((score/totalQuestions)*100);
      card.innerHTML = `
        <div class="question">Test completed!</div>
        <div class="result ok" style="text-align:center;font-size:18px;margin-bottom:12px;">
          Your result: ${score}/${totalQuestions} (${perc}%)
        </div>
        <div style="text-align:center;">${perc >= 80 ? "Excellent work! 👍" : perc >= 50 ? "Good job, keep practicing! 😊" : "Keep practicing — you'll get it! 📚"}</div>
        <div class="controls" style="justify-content:center;margin-top:12px;">
          <button id="restart">Retry</button>
          <button class="secondary"><a style="text-decoration:none; color: #60a5fa" href="{% if back_url == 'quadratic_equations' %}{% url 'quadratic_equations' %}{% else %}{% url 'equalities_inequalities' %}{% endif %}">Exit</a></button>
        </div>
      `;
      document.getElementById('restart').addEventListener('click', startQuiz);
    }

    startQuiz();
</script>
</body>
</html>
