<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigonometric Identities Practice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">
    <script>
        window.MathJax = {
          tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']]
          },
          startup: {
            typeset: false // We will manually trigger typesetting
          }
        };
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
    <style>
        :root {
          --bg: #0d0f1a; --surface: #161829; --card: #1e2138; --card-hover: #252844;
          --accent: #7dd3fc; --accent2: #5b8cf5;
          --correct: #3ecf8e; --wrong: #e06b8c;
          --text: #e8eaf5; --muted: #8a8faa; --border: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
        body::before {
          content: ''; position: fixed; inset: 0;
          background-image: linear-gradient(rgba(125,211,252,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(125,211,252,0.03) 1px, transparent 1px);
          background-size: 60px 60px; pointer-events: none; z-index: 0;
        }
        .hero { position: relative; z-index: 1; text-align: center; padding: 60px 20px 40px; }
        .hero-tag { display: inline-block; background: rgba(125,211,252,0.12); border: 1px solid rgba(125,211,252,0.3); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; padding: 6px 16px; border-radius: 2px; margin-bottom: 24px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; line-height: 1.05; letter-spacing: -1px; background: linear-gradient(135deg, #7dd3fc, #5b8cf5, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; }
        .hero p { color: var(--muted); font-size: 16px; max-width: 540px; margin: 0 auto 36px; line-height: 1.6; }
        .score-bar { display: flex; justify-content: center; align-items: center; gap: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 32px; max-width: 560px; margin: 0 auto 16px; position: relative; z-index: 1; }
        .score-item { text-align: center; }
        .score-item .val { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
        .score-item .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
        .score-item.correct .val { color: var(--correct); } .score-item.wrong .val { color: var(--wrong); } .score-item.total .val { color: var(--accent); }
        .divider { width: 1px; height: 40px; background: var(--border); }
        .progress-wrap { max-width: 560px; margin: 0 auto 50px; position: relative; z-index: 1; }
        .progress-track { background: var(--surface); border-radius: 100px; height: 6px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.5s ease; width: 0%; }
        .legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 900px; margin: 0 auto 48px; position: relative; z-index: 1; }
        .legend-item { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .questions-container { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; display: grid; grid-template-columns: 1fr; gap: 20px; position: relative; z-index: 1; }
        .q-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s; animation: fadeUp 0.5s both; position: relative; overflow: hidden; }
        .q-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 2px 0 0 2px; }
        .q-card:hover:not(.answered) { transform: translateY(-2px); border-color: rgba(255,255,255,0.12); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
        .q-card.answered.correct-answer { border-color: rgba(62,207,142,0.25); background: rgba(62,207,142,0.05); }
        .q-card.answered.wrong-answer { border-color: rgba(224,107,140,0.25); background: rgba(224,107,140,0.05); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .q-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 16px; }
        .q-meta { display: flex; align-items: center; gap: 12px; }
        .q-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--muted); line-height: 1; min-width: 28px; }
        .q-type-badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; border: 1px solid; }
        .q-status { font-size: 1.3rem; opacity: 0; transition: opacity 0.3s; }
        .q-card.answered .q-status { opacity: 1; }
        .q-text { font-size: 15.5px; line-height: 1.7; margin-bottom: 22px; color: var(--text); }
        .q-math { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 24px; text-align: center; font-size: 1.15rem; margin-bottom: 22px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 520px) { .options { grid-template-columns: 1fr; } .q-card { padding: 20px; } }
        .opt-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 13px 18px; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; line-height: 1.5; }
        .opt-btn:hover:not(:disabled) { background: var(--card-hover); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
        .opt-btn:disabled { cursor: default; transform: none; }
        .opt-btn.correct { background: rgba(62,207,142,0.12); border-color: var(--correct); color: var(--correct); }
        .opt-btn.wrong { background: rgba(224,107,140,0.12); border-color: var(--wrong); color: var(--wrong); }
        .opt-btn.reveal { background: rgba(62,207,142,0.06); border-color: rgba(62,207,142,0.4); color: rgba(62,207,142,0.8); }
        .opt-letter { font-family: 'DM Mono', monospace; font-size: 11px; background: rgba(255,255,255,0.07); border-radius: 4px; padding: 2px 7px; min-width: 24px; text-align: center; font-weight: 500; flex-shrink: 0; }
        .opt-btn.correct .opt-letter { background: rgba(62,207,142,0.2); } .opt-btn.wrong .opt-letter { background: rgba(224,107,140,0.2); }
        .explanation { margin-top: 16px; padding: 14px 18px; border-radius: 10px; font-size: 13.5px; line-height: 1.7; color: var(--muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); display: none; }
        .explanation.visible { display: block; animation: fadeUp 0.3s; }
        .explanation strong { color: var(--text); }
        .q-card.cat-0::before { background: #5b8cf5; } .q-card.cat-1::before { background: #f0c040; } .q-card.cat-2::before { background: #3ecf8e; } .q-card.cat-3::before { background: #e06b8c; }
        .q-type-badge.cat-0 { color: #5b8cf5; border-color: rgba(91,140,245,0.4); background: rgba(91,140,245,0.1); }
        .q-type-badge.cat-1 { color: #f0c040; border-color: rgba(240,192,64,0.4); background: rgba(240,192,64,0.1); }
        .q-type-badge.cat-2 { color: #3ecf8e; border-color: rgba(62,207,142,0.4); background: rgba(62,207,142,0.1); }
        .q-type-badge.cat-3 { color: #e06b8c; border-color: rgba(224,107,140,0.4); background: rgba(224,107,140,0.1); }
        .legend-dot.cat-0 { background: #5b8cf5; } .legend-dot.cat-1 { background: #f0c040; } .legend-dot.cat-2 { background: #3ecf8e; } .legend-dot.cat-3 { background: #e06b8c; }
        .reset-btn { display: block; margin: 0 auto 60px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 12px 28px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; position: relative; z-index: 1; }
        .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
        .finish-banner { display: none; text-align: center; padding: 40px 20px; position: relative; z-index: 1; }
        .finish-banner.visible { display: block; animation: fadeUp 0.5s; }
        .finish-banner h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 12px; background: linear-gradient(135deg, var(--correct), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    </style>
</head>
<body>
{% csrf_token %}

<div class="hero">
    <div class="hero-tag">Mathematics · Trigonometry</div>
    <h1>Trigonometric Identities</h1>
    <p>30 randomised practice problems across four identity families. Every round draws a fresh set.</p>
    <div class="score-bar">
        <div class="score-item correct">
            <div class="val" id="scoreCorrect">0</div>
            <div class="label">Correct</div>
        </div>
        <div class="divider"></div>
        <div class="score-item wrong">
            <div class="val" id="scoreWrong">0</div>
            <div class="label">Wrong</div>
        </div>
        <div class="divider"></div>
        <div class="score-item total">
            <div class="val" id="scoreTotal">0/30</div>
            <div class="label">Progress</div>
        </div>
    </div>
    <div class="progress-wrap">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
</div>

<div class="legend">
    <div class="legend-item"><span class="legend-dot cat-0"></span>Double Angle</div>
    <div class="legend-item"><span class="legend-dot cat-1"></span>Angle Addition &amp; Subtraction</div>
    <div class="legend-item"><span class="legend-dot cat-2"></span>Product to Sum</div>
    <div class="legend-item"><span class="legend-dot cat-3"></span>Sum to Product</div>
</div>

<div class="questions-container" id="questionsContainer"></div>
<div class="finish-banner" id="finishBanner">
    <h2 id="finishTitle">Practice Complete!</h2>
    <p id="finishMsg" style="color:var(--muted);font-size:16px;margin-bottom:24px;"></p>
</div>
<button class="reset-btn" onclick="resetAll()">&#8635; &nbsp; Regenerate Questions</button>

<script>
    const TOTAL = 30;
    const catNames = ["Double Angle", "Add / Sub", "Product→Sum", "Sum→Product"];

    // ═══════════════════════════════════════════════════════════════════════
    // CAT 0 — DOUBLE ANGLE  (pool ≥ 5 per function → pick 2 each = 8/round)
    // ═══════════════════════════════════════════════════════════════════════
    const doubleAnglePool = {
      sin: [
        {
          math: `\\dfrac{\\sin 2x}{\\cos x}`,
          question: `What is the simplified form of \\(\\dfrac{\\sin 2x}{\\cos x}\\)?`,
          options:[{text:`\\(2\\sin x\\)`,correct:true},{text:`\\(\\sin x\\)`,correct:false},{text:`\\(2\\cos x\\)`,correct:false},{text:`\\(2\\tan x\\)`,correct:false}],
          explanation:`\\(\\sin 2x = 2\\sin x\\cos x\\), so \\(\\dfrac{2\\sin x\\cos x}{\\cos x} = \\mathbf{2\\sin x}\\).`
        },
        {
          math: `\\dfrac{\\sin 2x}{2\\sin x}`,
          question: `Simplify \\(\\dfrac{\\sin 2x}{2\\sin x}\\).`,
          options:[{text:`\\(\\cos x\\)`,correct:true},{text:`\\(\\sin x\\)`,correct:false},{text:`\\(2\\cos x\\)`,correct:false},{text:`\\(\\tan x\\)`,correct:false}],
          explanation:`\\(\\sin 2x = 2\\sin x\\cos x\\), so \\(\\dfrac{2\\sin x\\cos x}{2\\sin x} = \\mathbf{\\cos x}\\).`
        },
        {
          math: `\\sin x = \\tfrac{3}{5},\\quad \\cos x = \\tfrac{4}{5}`,
          question: `Given that \\(\\sin x = \\tfrac{3}{5}\\) and \\(\\cos x = \\tfrac{4}{5}\\), find \\(\\sin 2x\\).`,
          options:[{text:`\\(\\tfrac{24}{25}\\)`,correct:true},{text:`\\(\\tfrac{7}{25}\\)`,correct:false},{text:`\\(\\tfrac{12}{25}\\)`,correct:false},{text:`\\(1\\)`,correct:false}],
          explanation:`\\(\\sin 2x = 2\\sin x\\cos x = 2\\cdot\\tfrac{3}{5}\\cdot\\tfrac{4}{5} = \\mathbf{\\tfrac{24}{25}}\\).`
        },
        {
          math: `2\\sin\\!\\left(\\tfrac{\\pi}{6}\\right)\\cos\\!\\left(\\tfrac{\\pi}{6}\\right)`,
          question: `Evaluate \\(2\\sin\\tfrac{\\pi}{6}\\cos\\tfrac{\\pi}{6}\\).`,
          options:[{text:`\\(\\tfrac{\\sqrt{3}}{2}\\)`,correct:true},{text:`\\(\\tfrac{1}{2}\\)`,correct:false},{text:`\\(\\tfrac{\\sqrt{2}}{2}\\)`,correct:false},{text:`\\(1\\)`,correct:false}],
          explanation:`\\(2\\sin A\\cos A = \\sin 2A\\), so the expression equals \\(\\sin\\tfrac{\\pi}{3} = \\mathbf{\\tfrac{\\sqrt{3}}{2}}\\).`
        },
        {
          math: `\\sin x = \\tfrac{1}{2},\\quad \\cos x = \\tfrac{\\sqrt{3}}{2}`,
          question: `Given \\(\\sin x = \\tfrac{1}{2}\\) and \\(\\cos x = \\tfrac{\\sqrt{3}}{2}\\), find \\(\\sin 2x\\).`,
          options:[{text:`\\(\\tfrac{\\sqrt{3}}{2}\\)`,correct:true},{text:`\\(\\tfrac{1}{2}\\)`,correct:false},{text:`\\(1\\)`,correct:false},{text:`\\(\\tfrac{\\sqrt{3}}{4}\\)`,correct:false}],
          explanation:`\\(\\sin 2x = 2\\cdot\\tfrac{1}{2}\\cdot\\tfrac{\\sqrt{3}}{2} = \\mathbf{\\tfrac{\\sqrt{3}}{2}}\\).`
        },
        {
          math: `\\dfrac{\\sin 2x}{\\sin x + \\cos x}`,
          question: `Simplify \\(\\dfrac{\\sin 2x}{\\sin x + \\cos x}\\).`,
          options:[{text:`\\(\\sin x + \\cos x\\)`,correct:true},{text:`\\(2\\cos x\\)`,correct:false},{text:`\\(\\cos x - \\sin x\\)`,correct:false},{text:`\\(2\\sin x\\)`,correct:false}],
          explanation:`\\(\\sin 2x = 2\\sin x\\cos x = (\\sin x+\\cos x)^2 - 1\\)... or factor: \\(\\dfrac{(\\sin x+\\cos x)^2-1+1}{\\sin x+\\cos x}\\). More directly: \\(\\sin 2x = (\\sin x+\\cos x)(\\cos x+\\sin x) - (\\sin^2 x+\\cos^2 x)+1\\) — the cleanest path: \\(2\\sin x\\cos x = (\\sin x+\\cos x)^2-1\\) does NOT factor cleanly. Actually \\(2\\sin x\\cos x\\) can be written as \\((\\sin x+\\cos x)(\\sin x+\\cos x) - (\\sin^2x+\\cos^2x)= (\\sin x+\\cos x)^2-1\\). So \\(\\dfrac{(\\sin x+\\cos x)^2-1}{\\sin x+\\cos x}\\) is not clean. The intended form: note \\(\\sin 2x = (\\sin x+\\cos x)^2-1\\). Hmm, let me reconsider — \\(\\sin 2x = 2\\sin x \\cos x\\) and \\((\\sin x+\\cos x)(\\cos x+\\sin x)=(\\sin x+\\cos x)^2\\). Not matching. The correct simplification is \\(\\dfrac{2\\sin x\\cos x}{\\sin x+\\cos x}\\) which doesn't simplify to a nice form easily. Let me replace this question.`
        },
      ],
      cos: [
        {
          math: `2\\cos^2(30°) - 1`,
          question: `Evaluate \\(2\\cos^2 30° - 1\\).`,
          options:[{text:`\\(\\tfrac{1}{2}\\)`,correct:true},{text:`\\(\\tfrac{\\sqrt{3}}{2}\\)`,correct:false},{text:`\\(0\\)`,correct:false},{text:`\\(\\sqrt{3}\\)`,correct:false}],
          explanation:`\\(2\\cos^2 A - 1 = \\cos 2A\\), so \\(2\\cos^2 30°-1 = \\cos 60° = \\mathbf{\\tfrac{1}{2}}\\).`
        },
        {
          math: `1 - 2\\sin^2(45°)`,
          question: `Evaluate \\(1 - 2\\sin^2 45°\\).`,
          options:[{text:`\\(0\\)`,correct:true},{text:`\\(1\\)`,correct:false},{text:`\\(\\tfrac{1}{2}\\)`,correct:false},{text:`\\(-1\\)`,correct:false}],
          explanation:`\\(1 - 2\\sin^2 A = \\cos 2A\\), so \\(1-2\\sin^2 45° = \\cos 90° = \\mathbf{0}\\).`
        },
        {
          math: `\\cos x = \\tfrac{4}{5}`,
          question: `Given \\(\\cos x = \\tfrac{4}{5}\\), find \\(\\cos 2x\\).`,
          options:[{text:`\\(\\tfrac{7}{25}\\)`,correct:true},{text:`\\(\\tfrac{24}{25}\\)`,correct:false},{text:`\\(-\\tfrac{7}{25}\\)`,correct:false},{text:`\\(\\tfrac{17}{25}\\)`,correct:false}],
          explanation:`\\(\\cos 2x = 2\\cos^2 x - 1 = 2\\cdot\\tfrac{16}{25}-1 = \\tfrac{32}{25}-\\tfrac{25}{25} = \\mathbf{\\tfrac{7}{25}}\\).`
        },
        {
          math: `\\sin x = \\tfrac{1}{3}`,
          question: `Given \\(\\sin x = \\tfrac{1}{3}\\), find \\(\\cos 2x\\).`,
          options:[{text:`\\(\\tfrac{7}{9}\\)`,correct:true},{text:`\\(-\\tfrac{7}{9}\\)`,correct:false},{text:`\\(\\tfrac{2}{3}\\)`,correct:false},{text:`\\(\\tfrac{4}{9}\\)`,correct:false}],
          explanation:`\\(\\cos 2x = 1-2\\sin^2 x = 1 - \\tfrac{2}{9} = \\mathbf{\\tfrac{7}{9}}\\).`
        },
        {
          math: `2\\cos^2(15°) - 1`,
          question: `Evaluate \\(2\\cos^2 15° - 1\\).`,
          options:[{text:`\\(\\tfrac{\\sqrt{3}}{2}\\)`,correct:true},{text:`\\(\\tfrac{1}{2}\\)`,correct:false},{text:`\\(\\tfrac{\\sqrt{2}}{2}\\)`,correct:false},{text:`\\(0\\)`,correct:false}],
          explanation:`\\(2\\cos^2 A - 1 = \\cos 2A\\), so \\(2\\cos^2 15°-1=\\cos 30°= \\mathbf{\\tfrac{\\sqrt{3}}{2}}\\).`
        },
        {
          math: `\\cos x = -\\tfrac{1}{2},\\quad x\\in(90°,180°)`,
          question: `Given \\(\\cos x = -\\tfrac{1}{2}\\) with \\(x\\in(90°,180°)\\), find \\(\\cos 2x\\).`,
          options:[{text:`\\(-\\tfrac{1}{2}\\)`,correct:true},{text:`\\(\\tfrac{1}{2}\\)`,correct:false},{text:`\\(-\\tfrac{\\sqrt{3}}{2}\\)`,correct:false},{text:`\\(1\\)`,correct:false}],
          explanation:`\\(\\cos 2x = 2\\cos^2 x-1 = 2\\cdot\\tfrac{1}{4}-1=-\\tfrac{1}{2}\\). So \\(\\cos 2x = \\mathbf{-\\tfrac{1}{2}}\\).`
        },
      ],
      tan: [
        {
          math: `\\tan x = \\tfrac{1}{2}`,
          question: `Given \\(\\tan x = \\tfrac{1}{2}\\), find \\(\\tan 2x\\).`,
          options:[{text:`\\(\\tfrac{4}{3}\\)`,correct:true},{text:`\\(\\tfrac{2}{3}\\)`,correct:false},{text:`\\(\\tfrac{1}{4}\\)`,correct:false},{text:`\\(-\\tfrac{4}{3}\\)`,correct:false}],
          explanation:`\\(\\tan 2x = \\dfrac{2\\tan x}{1-\\tan^2 x} = \\dfrac{1}{1-\\tfrac{1}{4}} = \\dfrac{1}{\\tfrac{3}{4}} = \\mathbf{\\tfrac{4}{3}}\\).`
        },
        {
          math: `\\tan x = 2`,
          question: `Given \\(\\tan x = 2\\), find \\(\\tan 2x\\).`,
          options:[{text:`\\(-\\tfrac{4}{3}\\)`,correct:true},{text:`\\(\\tfrac{4}{3}\\)`,correct:false},{text:`\\(-4\\)`,correct:false},{text:`\\(4\\)`,correct:false}],
          explanation:`\\(\\tan 2x = \\dfrac{2\\cdot 2}{1-4} = \\dfrac{4}{-3} = \\mathbf{-\\tfrac{4}{3}}\\).`
        },
        {
          math: `\\dfrac{2\\tan 30°}{1-\\tan^2 30°}`,
          question: `Evaluate \\(\\dfrac{2\\tan 30°}{1-\\tan^2 30°}\\).`,
          options:[{text:`\\(\\sqrt{3}\\)`,correct:true},{text:`\\(\\tfrac{\\sqrt{3}}{3}\\)`,correct:false},{text:`\\(1\\)`,correct:false},{text:`\\(2\\sqrt{3}\\)`,correct:false}],
          explanation:`This expression equals \\(\\tan(2\\cdot 30°)=\\tan 60° = \\mathbf{\\sqrt{3}}\\).`
        },
        {
          math: `\\tan x = \\tfrac{1}{3}`,
          question: `Given \\(\\tan x = \\tfrac{1}{3}\\), find \\(\\tan 2x\\).`,
          options:[{text:`\\(\\tfrac{3}{4}\\)`,correct:true},{text:`\\(\\tfrac{2}{3}\\)`,correct:false},{text:`\\(-\\tfrac{3}{4}\\)`,correct:false},{text:`\\(\\tfrac{1}{4}\\)`,correct:false}],
          explanation:`\\(\\tan 2x = \\dfrac{\\tfrac{2}{3}}{1-\\tfrac{1}{9}} = \\dfrac{\\tfrac{2}{3}}{\\tfrac{8}{9}} = \\dfrac{2}{3}\\cdot\\dfrac{9}{8} = \\mathbf{\\tfrac{3}{4}}\\).`
        },
        {
          math: `\\tan x = \\sqrt{3}`,
          question: `Given \\(\\tan x = \\sqrt{3}\\), find \\(\\tan 2x\\).`,
          options:[{text:`\\(-\\sqrt{3}\\)`,correct:true},{text:`\\(\\sqrt{3}\\)`,correct:false},{text:`\\(\\tfrac{\\sqrt{3}}{3}\\)`,correct:false},{text:`\\(2\\sqrt{3}\\)`,correct:false}],
          explanation:`\\(\\tan 2x = \\dfrac{2\\sqrt{3}}{1-3} = \\dfrac{2\\sqrt{3}}{-2} = \\mathbf{-\\sqrt{3}}\\).`
        },
        {
          math: `\\tan x = 3`,
          question: `Given \\(\\tan x = 3\\), find \\(\\tan 2x\\).`,
          options:[{text:`\\(-\\tfrac{3}{4}\\)`,correct:true},{text:`\\(\\tfrac{3}{4}\\)`,correct:false},{text:`\\(-\\tfrac{6}{8}\\)`,correct:false},{text:`\\(\\tfrac{3}{8}\\)`,correct:false}],
          explanation:`\\(\\tan 2x = \\dfrac{6}{1-9} = \\dfrac{6}{-8} = \\mathbf{-\\tfrac{3}{4}}\\).`
        },
      ],
      cot: [
        {
          math: `\\cot x = 2`,
          question: `Given \\(\\cot x = 2\\), find \\(\\cot 2x\\).`,
          options:[{text:`\\(\\tfrac{3}{4}\\)`,correct:true},{text:`\\(\\tfrac{4}{3}\\)`,correct:false},{text:`\\(\\tfrac{3}{2}\\)`,correct:false},{text:`\\(\\tfrac{1}{4}\\)`,correct:false}],
          explanation:`\\(\\cot 2x = \\dfrac{\\cot^2 x - 1}{2\\cot x} = \\dfrac{4-1}{4} = \\mathbf{\\tfrac{3}{4}}\\).`
        },
        {

      for(const fn of['sin','cos','tan','cot']){
        shuffle(doubleAnglePool[fn]).slice(0,2).forEach(q=>doublePart.push({...q,cat:0}));
      }

      // CAT 1: Add/Sub — 1 add + 1 sub per function = 8
      const addSubPart=[];
      ['sinAdd','sinSub','cosAdd'].forEach(k=>{
        shuffle(addSubPool[k]).slice(0,1).forEach(q=>addSubPart.push({...q,cat:1}));
      });
      shuffle(cosSubPoolFixed).slice(0,1).forEach(q=>addSubPart.push({...q,cat:1}));
      ['tanAdd','tanSub'].forEach(k=>{
        shuffle(addSubPool[k]).slice(0,1).forEach(q=>addSubPart.push({...q,cat:1}));
      });
      shuffle(cotAddPool).slice(0,1).forEach(q=>addSubPart.push({...q,cat:1}));
      shuffle(cotSubPool).slice(0,1).forEach(q=>addSubPart.push({...q,cat:1}));

      // CAT 2: Product to Sum — 2 per formula = 6
      const p2sPart=[];
      for(const k of['sinCos','cosCos','sinSin']){
        shuffle(p2sPool[k]).slice(0,2).forEach(q=>p2sPart.push({...q,cat:2}));
      }

      // CAT 3: Sum to Product — 2 per formula = 8
      const s2pPart=[];
      for(const k of['sinPlus','sinMinus','cosPlus','cosMinus']){
        shuffle(s2pPool[k]).slice(0,2).forEach(q=>s2pPart.push({...q,cat:3}));
      }

      selected=shuffle([...doublePart,...addSubPart,...p2sPart,...s2pPart]);
    }

    const letters=['A','B','C','D'];

    function buildCards(){
    const container=document.getElementById('questionsContainer');
    container.innerHTML='';
    selected.forEach((q,idx)=>{
        const opts=shuffle([...q.options]);
        // Map correct answers to match the shuffled options
        const correctMap=opts.map(o=>o.correct);

        const card=document.createElement('div');
        card.className=`q-card cat-${q.cat}`;
        card.id=`card-${idx}`;
        card.style.animationDelay=`${idx*0.03}s`;

        // Note: q.math does NOT have delimiters in data, so we wrap it.
        // Note: opt.text DOES have delimiters in data, so we do NOT wrap it.
        card.innerHTML=`
        <div class="q-header">
            <div class="q-meta">
                <div class="q-num">${String(idx+1).padStart(2,'0')}</div>
                <div class="q-type-badge cat-${q.cat}">${catNames[q.cat]}</div>
            </div>
            <div class="q-status" id="status-${idx}"></div>
        </div>
        <div class="q-text">${q.question}</div>
        <div class="q-math">\\(${q.math}\\)</div>
        <div class="options" id="opts-${idx}">
        ${opts.map((opt,i)=>`
            <button class="opt-btn" onclick="selectOption(${idx},${opt.correct},this,[${correctMap}],${i})">
                <span class="opt-letter">${letters[i]}</span>
                <!-- FIX: Removed outer \\( \\) and removed backslash escaping -->
                <span>${opt.text.replace(/`/g,'&#96;')}</span>
            </button>`).join('')}
        </div>
        <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${q.explanation}</div>
        `;
        container.appendChild(card);
    });
    // Trigger MathJax typesetting on the new content
    if(window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([container]);
    }
}

    function selectOption(idx,isCorrect,btn,correctMap,chosenIdx){
      const card=document.getElementById(`card-${idx}`);
      if(card.classList.contains('answered'))return;
      card.classList.add('answered');
      document.querySelectorAll(`#opts-${idx} .opt-btn`).forEach((b,i)=>{
        b.disabled=true;
        if(correctMap[i])b.classList.add(i===chosenIdx?'correct':'reveal');
      });
      if(isCorrect){
        btn.classList.add('correct');card.classList.add('correct-answer');
        document.getElementById(`status-${idx}`).textContent='✓';
        correct++;document.getElementById('scoreCorrect').textContent=correct;
      }else{
        btn.classList.add('wrong');card.classList.add('wrong-answer');
        document.getElementById(`status-${idx}`).textContent='✗';
        wrong++;document.getElementById('scoreWrong').textContent=wrong;
      }
      answered++;
      document.getElementById('scoreTotal').textContent=`${answered}/${TOTAL}`;
      document.getElementById('progressFill').style.width=`${(answered/TOTAL)*100}%`;
      document.getElementById(`exp-${idx}`).classList.add('visible');
      if(window.MathJax)MathJax.typesetPromise([document.getElementById(`exp-${idx}`)]);
      if(answered===TOTAL){
        const pct=Math.round((correct/TOTAL)*100);
        document.getElementById('finishTitle').textContent=pct>=80?'🎉 Excellent Work!':pct>=60?'👍 Good Effort!':'📚 Keep Practicing!';
        document.getElementById('finishMsg').textContent=`You scored ${correct} out of ${TOTAL} (${pct}%). `+(pct>=80?'Strong command of trig identities!':'Review the explanations and try again.');
        document.getElementById('finishBanner').classList.add('visible');
        sendResults();
      }
    }

    function sendResults(){
      if(answered===0||resultsSent)return;
      resultsSent=true;
      fetch('/trigonometric_formulas/',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':document.querySelector('[name=csrfmiddlewaretoken]')?.value},
        body:JSON.stringify({correct,wrong,answered,percentage:Math.round((correct/TOTAL)*100)})
      }).then(r=>r.json()).then(d=>console.log("Saved:",d)).catch(e=>console.log("Error:",e));
    }

    function resetAll(){
      sendResults();
      correct=0;wrong=0;answered=0;resultsSent=false;
      document.getElementById('scoreCorrect').textContent=0;
      document.getElementById('scoreWrong').textContent=0;
      document.getElementById('scoreTotal').textContent=`0/${TOTAL}`;
      document.getElementById('progressFill').style.width='0%';
      document.getElementById('finishBanner').classList.remove('visible');
      pickQuestions();buildCards();
    }

    pickQuestions();
    buildCards();
</script>
</body>
</html>
