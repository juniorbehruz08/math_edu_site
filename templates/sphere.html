<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Sphere Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            flex-shrink: 0;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            position: relative;
            overflow: hidden;
        }

        .visualization {
            flex-grow: 1;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        #sphere-container {
            width: 100%;
            height: 100%;
            display: block;
        }

        .properties {
            width: 340px;
            height: 100%;
            background: rgba(10, 25, 47, 0.9);
            backdrop-filter: blur(15px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-shrink: 0;
            z-index: 10;
        }

        .property-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .property-card h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #4facfe;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .property-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .property-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 8px;
        }

        .property-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 4px;
        }

        .property-value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #00f2fe;
            font-family: monospace;
        }

        /* Input Slider Styling */
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
            margin: 10px 0;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #00f2fe;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.6);
            border: 2px solid #fff;
        }

        .value-display {
            text-align: right;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .formula-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .formula-expression {
            font-family: 'Courier New', monospace;
            color: #4facfe;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* Legend removed as lines are gone */

        @media (max-width: 800px) {
            .container { flex-direction: column; overflow-y: auto; }
            .visualization { height: 50vh; min-height: 300px; }
            .properties { width: 100%; height: auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sphere Geom</h1>
    </header>

    <div class="container">
        <div class="visualization">
            <div id="sphere-container"></div>
        </div>

        <div class="properties">

            <div class="property-card">
                <h2>🎛️ Adjust Size</h2>
                <div class="control-group">
                    <label style="display:block; margin-bottom:5px; color:#ccc;">Radius (r)</label>
                    <div class="value-display" id="radius-display">2.0 units</div>
                    <input type="range" id="radius-slider" min="0.5" max="5.0" step="0.1" value="2.0">
                </div>
            </div>

            <div class="property-card">
                <h2>📐 Live Metrics</h2>
                <div class="property-list">
                    <div class="property-item">
                        <div class="property-label">Radius</div>
                        <div class="property-value" id="radius-value">2.0</div>
                    </div>
                    <div class="property-item">
                        <div class="property-label">Diameter</div>
                        <div class="property-value" id="diameter-value">4.0</div>
                    </div>
                    <div class="property-item">
                        <div class="property-label">Surface Area</div>
                        <div class="property-value" id="surface-area-value">50.27</div>
                    </div>
                    <div class="property-item">
                        <div class="property-label">Volume</div>
                        <div class="property-value" id="volume-value">33.51</div>
                    </div>
                </div>
            </div>

            <div class="property-card">
                <h2>🧮 Calculations</h2>
                <div class="formulas">
                    <div class="formula-item">
                        <div style="color:#aaa; font-size:0.8rem;">Diameter (d = 2r)</div>
                        <div class="formula-expression">= <span id="diameter-formula">2 × 2.0 = 4.0</span></div>
                    </div>
                    <div class="formula-item">
                        <div style="color:#aaa; font-size:0.8rem;">Surface Area (A = 4πr²)</div>
                        <div class="formula-expression">= <span id="surface-area-formula">4π(2.0)² = 50.27</span></div>
                    </div>
                    <div class="formula-item">
                        <div style="color:#aaa; font-size:0.8rem;">Volume (V = ⁴⁄₃πr³)</div>
                        <div class="formula-expression">= <span id="volume-formula">⁴⁄₃π(2.0)³ = 33.51</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, sphereGroup;
        let radius = 2.0;
        const container = document.getElementById('sphere-container');

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 2, 16);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Create Group to hold sphere
            sphereGroup = new THREE.Group();
            scene.add(sphereGroup);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            // Helpers
            const gridHelper = new THREE.GridHelper(20, 20, 0xffffff, 0xffffff);
            gridHelper.position.y = -6;
            gridHelper.material.opacity = 0.1;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Initial Draw
            drawGeometry(radius);
            updateTextValues(radius);

            // Event Listeners
            const slider = document.getElementById('radius-slider');
            slider.addEventListener('input', (e) => {
                const newRadius = parseFloat(e.target.value);
                drawGeometry(newRadius);
                updateTextValues(newRadius);
            });

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function drawGeometry(r) {
            // clear previous
            while(sphereGroup.children.length > 0){
                sphereGroup.remove(sphereGroup.children[0]);
            }

            // 1. Transparent Sphere
            const geometry = new THREE.SphereGeometry(r, 64, 64);
            const material = new THREE.MeshPhysicalMaterial({
                color: 0x00f2fe,
                metalness: 0.1,
                roughness: 0.1,
                transmission: 0.6,
                thickness: 0.5,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            });
            const sphere = new THREE.Mesh(geometry, material);
            sphereGroup.add(sphere);

            // 2. Wireframe
            const wireframe = new THREE.LineSegments(
                new THREE.WireframeGeometry(geometry),
                new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1 })
            );
            sphereGroup.add(wireframe);

            // 3. Equator Ring
            const ringGeo = new THREE.RingGeometry(r - 0.05, r + 0.05, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x4facfe, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            sphereGroup.add(ring);

            // Lines removed from here
        }

        function updateTextValues(r) {
            const d = r * 2;
            const sa = 4 * Math.PI * r * r;
            const v = (4/3) * Math.PI * Math.pow(r, 3);

            // Update Displays
            document.getElementById('radius-display').textContent = r.toFixed(1) + ' units';
            document.getElementById('radius-value').textContent = r.toFixed(1);
            document.getElementById('diameter-value').textContent = d.toFixed(1);
            document.getElementById('surface-area-value').textContent = sa.toFixed(2);
            document.getElementById('volume-value').textContent = v.toFixed(2);

            // Update Formulas
            document.getElementById('diameter-formula').textContent = `2 × ${r.toFixed(1)} = ${d.toFixed(1)}`;
            document.getElementById('surface-area-formula').textContent = `4π(${r.toFixed(1)})² = ${sa.toFixed(2)}`;
            document.getElementById('volume-formula').textContent = `⁴⁄₃π(${r.toFixed(1)})³ = ${v.toFixed(2)}`;
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            // Rotate the group slowly so we can see the 3D depth
            sphereGroup.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
