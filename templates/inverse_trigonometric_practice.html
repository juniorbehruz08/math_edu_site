<style>
:root {
--bg: #0d0f1a; --surface: #161829; --card: #1e2138; --card-hover: #252844;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
content: ''; position: fixed; inset: 0;
background-image: linear-gradient(rgba(125,211,252,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(125,211,252,0.03) 1px, transparent 1px);
background-size: 60px 60px; pointer-events: none; z-index: 0;
}
.hero { position: relative; z-index: 1; text-align: center; padding: 60px 20px 40px; }
.hero-tag { display: inline-block; background: rgba(125,211,252,0.12); border: 1px solid rgba(125,211,252,0.3); color: var(--accent); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; padding: 6px 16px; border-radius: 2px; margin-bottom: 24px; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 900; line-height: 1.05; letter-spacing: -1px; background: linear-gradient(135deg, #7dd3fc, #5b8cf5, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; }
.hero p { color: var(--muted); font-size: 16px; max-width: 540px; margin: 0 auto 36px; line-height: 1.6; }
.score-bar { display: flex; justify-content: center; align-items: center; gap: 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 32px; max-width: 560px; margin: 0 auto 16px; position: relative; z-index: 1; }
.score-item { text-align: center; }
.score-item .val { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; line-height: 1; }
.score-item .label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.score-item.correct .val { color: var(--correct); } .score-item.wrong .val { color: var(--wrong); } .score-item.total .val { color: var(--accent); }
.divider { width: 1px; height: 40px; background: var(--border); }
.progress-wrap { max-width: 560px; margin: 0 auto 50px; position: relative; z-index: 1; }
.progress-track { background: var(--surface); border-radius: 100px; height: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 100px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.5s ease; width: 0%; }
.legend { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 900px; margin: 0 auto 48px; position: relative; z-index: 1; }
.legend-item { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.questions-container { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; display: grid; grid-template-columns: 1fr; gap: 20px; position: relative; z-index: 1; }
.q-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 28px 32px; transition: transform 0.2s, border-color 0.3s, box-shadow 0.3s; animation: fadeUp 0.5s both; position: relative; overflow: hidden; }
.q-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 2px 0 0 2px; }
.q-card:hover:not(.answered) { transform: translateY(-2px); border-color: rgba(255,255,255,0.12); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
.q-card.answered.correct-answer { border-color: rgba(62,207,142,0.25); background: rgba(62,207,142,0.05); }
.q-card.answered.wrong-answer { border-color: rgba(224,107,140,0.25); background: rgba(224,107,140,0.05); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.q-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 16px; }
.q-meta { display: flex; align-items: center; gap: 12px; }
.q-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; color: var(--muted); line-height: 1; min-width: 28px; }
.q-type-badge { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; border: 1px solid; }
.q-status { font-size: 1.3rem; opacity: 0; transition: opacity 0.3s; }
.q-card.answered .q-status { opacity: 1; }
.q-text { font-size: 15.5px; line-height: 1.7; margin-bottom: 22px; color: var(--text); }
.q-math { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 24px; text-align: center; font-size: 1.15rem; margin-bottom: 22px; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 520px) { .options { grid-template-columns: 1fr; } .q-card { padding: 20px; } }
.opt-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 13px 18px; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: all 0.2s; display: flex; align-items: center; gap: 10px; line-height: 1.5; }
.opt-btn:hover:not(:disabled) { background: var(--card-hover); border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
.opt-btn:disabled { cursor: default; transform: none; }
.opt-btn.correct { background: rgba(62,207,142,0.12); border-color: var(--correct); color: var(--correct); }
.opt-btn.wrong { background: rgba(224,107,140,0.12); border-color: var(--wrong); color: var(--wrong); }
.opt-btn.reveal { background: rgba(62,207,142,0.06); border-color: rgba(62,207,142,0.4); color: rgba(62,207,142,0.8); }
.opt-letter { font-family: 'DM Mono', monospace; font-size: 11px; background: rgba(255,255,255,0.07); border-radius: 4px; padding: 2px 7px; min-width: 24px; text-align: center; font-weight: 500; flex-shrink: 0; }
.opt-btn.correct .opt-letter { background: rgba(62,207,142,0.2); } .opt-btn.wrong .opt-letter { background: rgba(224,107,140,0.2); }
.explanation { margin-top: 16px; padding: 14px 18px; border-radius: 10px; font-size: 13.5px; line-height: 1.7; color: var(--muted); background: rgba(255,255,255,0.03); border: 1px solid var(--border); display: none; }
.explanation.visible { display: block; animation: fadeUp 0.3s; }
.explanation strong { color: var(--text); }
/* Category Colors */
.q-card.cat-0::before { background: #f0c040; } .q-card.cat-1::before { background: #5b8cf5; } .q-card.cat-2::before { background: #e06b8c; } .q-card.cat-3::before { background: #3ecf8e; }
.q-type-badge.cat-0 { color: #f0c040; border-color: rgba(240,192,64,0.4); background: rgba(240,192,64,0.1); }
.q-type-badge.cat-1 { color: #5b8cf5; border-color: rgba(91,140,245,0.4); background: rgba(91,140,245,0.1); }
.q-type-badge.cat-2 { color: #e06b8c; border-color: rgba(224,107,140,0.4); background: rgba(224,107,140,0.1); }
.q-type-badge.cat-3 { color: #3ecf8e; border-color: rgba(62,207,142,0.4); background: rgba(62,207,142,0.1); }
.legend-dot.cat-0 { background: #f0c040; } .legend-dot.cat-1 { background: #5b8cf5; } .legend-dot.cat-2 { background: #e06b8c; } .legend-dot.cat-3 { background: #3ecf8e; }
.reset-btn { display: block; margin: 0 auto 60px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 12px 28px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; position: relative; z-index: 1; }
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }
.finish-banner { display: none; text-align: center; padding: 40px 20px; position: relative; z-index: 1; }
.finish-banner.visible { display: block; animation: fadeUp 0.5s; }
.finish-banner h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 12px; background: linear-gradient(135deg, var(--correct), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
</style>
</head>

{ math:`\\arcsin(0)`, question:`Evaluate \\(\\arcsin(0)\\).`, options:[{text:`0`,correct:true},{text:`\\pi`,correct:false},{text:`\\frac{\\pi}{2}`,correct:false},{text:`1`,correct:false}], explanation:`\\(\\sin 0 = 0\\), so \\(\\mathbf{0}\\).` },
// Arccos (2)
{ math:`\\arccos(0)`, question:`Evaluate \\(\\arccos(0)\\).`, options:[{text:`\\frac{\\pi}{2}`,correct:true},{text:`0`,correct:false},{text:`\\pi`,correct:false},{text:`1`,correct:false}], explanation:`\\(\\cos\\frac{\\pi}{2}=0\\), so \\(\\mathbf{\\frac{\\pi}{2}}\\).` },
{ math:`\\arccos(1)`, question:`Evaluate \\(\\arccos(1)\\).`, options:[{text:`0`,correct:true},{text:`\\pi`,correct:false},{text:`\\frac{\\pi}{2}`,correct:false},{text:`1`,correct:false}], explanation:`\\(\\cos 0 = 1\\), so \\(\\mathbf{0}\\).` },
// Arctan (1)
{ math:`\\arctan(\\sqrt{3})`, question:`Evaluate \\(\\arctan(\\sqrt{3})\\).`, options:[{text:`\\frac{\\pi}{3}`,correct:true},{text:`\\frac{\\pi}{6}`,correct:false},{text:`\\frac{\\pi}{2}`,correct:false},{text:`\\sqrt{3}`,correct:false}], explanation:`\\(\\tan\\frac{\\pi}{3}=\\sqrt{3}\\), so \\(\\mathbf{\\frac{\\pi}{3}}\\).` },
// Arccot (1)
{ math:`\\text{arccot}(\\sqrt{3})`, question:`Evaluate \\(\\text{arccot}(\\sqrt{3})\\).`, options:[{text:`\\frac{\\pi}{6}`,correct:true},{text:`\\frac{\\pi}{3}`,correct:false},{text:`\\frac{\\pi}{2}`,correct:false},{text:`\\sqrt{3}`,correct:false}], explanation:`\\(\\cot\\frac{\\pi}{6}=\\sqrt{3}\\), so \\(\\mathbf{\\frac{\\pi}{6}}\\).` },
]
};

// ─────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────
let correct=0, wrong=0, answered=0, resultsSent=false, selected=[];

function shuffle(arr) {
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
return a;
}

function pickQuestions() {
selected = [];
// Cat 0: Domain Fix (4)
shuffle(questionPools.domainFix).slice(0, 4).forEach(q => selected.push({...q, cat: 0}));
// Cat 1: Compositions (12)
shuffle(questionPools.compositions).slice(0, 12).forEach(q => selected.push({...q, cat: 1}));
// Cat 2: Negative Args (8)
shuffle(questionPools.negativeArgs).slice(0, 8).forEach(q => selected.push({...q, cat: 2}));
// Cat 3: Exact Values (6)
shuffle(questionPools.exactValues).slice(0, 6).forEach(q => selected.push({...q, cat: 3}));

selected = shuffle(selected);
}

const letters=['A','B','C','D'];

function buildCards(){
const container=document.getElementById('questionsContainer');
container.innerHTML='';
selected.forEach((q,idx)=>{
    const opts=shuffle([...q.options]);
    const correctMap=opts.map(o=>o.correct);

    const card=document.createElement('div');
    card.className=`q-card cat-${q.cat}`;
    card.id=`card-${idx}`;
    card.style.animationDelay=`${idx*0.03}s`;

    card.innerHTML=`
    <div class="q-header">
        <div class="q-meta">
            <div class="q-num">${String(idx+1).padStart(2,'0')}</div>
            <div class="q-type-badge cat-${q.cat}">${catNames[q.cat]}</div>
        </div>
        <div class="q-status" id="status-${idx}"></div>
    </div>
    <div class="q-text">${q.question}</div>
    <div class="q-math">\\(${q.math}\\)</div>
    <div class="options" id="opts-${idx}">
    ${opts.map((opt,i)=>`
        <button class="opt-btn" onclick="selectOption(${idx},${opt.correct},this,[${correctMap}],${i})">
            <span class="opt-letter">${letters[i]}</span>
            <span>\\(${opt.text.replace(/`/g,'&#96;')}\\)</span>
        </button>`).join('')}
    </div>
    <div class="explanation" id="exp-${idx}"><strong>Explanation:</strong> ${q.explanation}</div>
    `;
    container.appendChild(card);
});
if(window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]);
}
}

function selectOption(idx,isCorrect,btn,correctMap,chosenIdx){
const card=document.getElementById(`card-${idx}`);
if(card.classList.contains('answered'))return;
card.classList.add('answered');
document.querySelectorAll(`#opts-${idx} .opt-btn`).forEach((b,i)=>{
b.disabled=true;
if(correctMap[i])b.classList.add(i===chosenIdx?'correct':'reveal');
});
if(isCorrect){
btn.classList.add('correct');card.classList.add('correct-answer');
document.getElementById(`status-${idx}`).textContent='✓';
correct++;document.getElementById('scoreCorrect').textContent=correct;
}else{
btn.classList.add('wrong');card.classList.add('wrong-answer');
document.getElementById(`status-${idx}`).textContent='✗';
wrong++;document.getElementById('scoreWrong').textContent=wrong;
}
answered++;
document.getElementById('scoreTotal').textContent=`${answered}/${TOTAL}`;
document.getElementById('progressFill').style.width=`${(answered/TOTAL)*100}%`;
document.getElementById(`exp-${idx}`).classList.add('visible');
if(window.MathJax)MathJax.typesetPromise([document.getElementById(`exp-${idx}`)]);
if(answered===TOTAL){
const pct=Math.round((correct/TOTAL)*100);
document.getElementById('finishTitle').textContent=pct>=80?'🎉 Excellent Work!':pct>=60?'👍 Good Effort!':'📚 Keep Practicing!';
document.getElementById('finishMsg').textContent=`You scored ${correct} out of ${TOTAL} (${pct}%). `+(pct>=80?'Strong command of inverse trig!':'Review the explanations and try again.');
document.getElementById('finishBanner').classList.add('visible');
sendResults();
}
}

function sendResults(){
if(answered===0||resultsSent)return;
resultsSent=true;
fetch('/trigonometry_practice/',{
method:'POST',
headers:{'Content-Type':'application/json','X-CSRFToken':document.querySelector('[name=csrfmiddlewaretoken]')?.value},
body:JSON.stringify({correct,wrong,answered,percentage:Math.round((correct/TOTAL)*100)})
}).then(r=>r.json()).then(d=>console.log("Saved:",d)).catch(e=>console.log("Error:",e));
}

function resetAll(){
sendResults();
correct=0;wrong=0;answered=0;resultsSent=false;
document.getElementById('scoreCorrect').textContent=0;
document.getElementById('scoreWrong').textContent=0;
document.getElementById('scoreTotal').textContent=`0/${TOTAL}`;
document.getElementById('progressFill').style.width='0%';
document.getElementById('finishBanner').classList.remove('visible');
pickQuestions();buildCards();
}

pickQuestions();
buildCards();
</script>
</body>
</html>
