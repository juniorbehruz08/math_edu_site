<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Send a Message</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --ink:#1a1a18; --paper:#f5f0e8; --cream:#ede8da; --rust:#c0440e; --line:#d4cfc0; --success:#2d6a4f; }
        html, body { height:100%; background:var(--paper); color:var(--ink); font-family:'DM Sans',sans-serif; }
        body::before { content:''; position:fixed; inset:0; background-image:repeating-linear-gradient(0deg,transparent,transparent 28px,var(--line) 28px,var(--line) 29px); opacity:0.3; pointer-events:none; z-index:0; }
        .page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:40px 20px; position:relative; z-index:1; }
        .card { width:100%; max-width:560px; background:#fff; border:1px solid var(--line); border-radius:2px; box-shadow:6px 6px 0 var(--cream),7px 7px 0 var(--line); padding:52px 48px 44px; position:relative; }
        .card::before { content:''; position:absolute; top:0; left:0; width:48px; height:48px; background:var(--rust); clip-path:polygon(0 0,100% 0,0 100%); }
        .tag { font-size:10px; font-weight:500; letter-spacing:0.18em; text-transform:uppercase; color:var(--rust); margin-bottom:10px; }
        h1 { font-family:'Playfair Display',serif; font-size:28px; font-weight:700; line-height:1.2; color:var(--ink); margin-bottom:8px; }
        .subtitle { font-size:13px; font-weight:300; color:#888; margin-bottom:36px; line-height:1.6; }
        .type-row { display:flex; gap:10px; margin-bottom:24px; }
        .type-label { flex:1; cursor:pointer; }
        .type-label input[type="radio"] { display:none; }
        .type-label span { display:block; width:100%; padding:10px 0; text-align:center; border:1px solid var(--line); border-radius:2px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.06em; color:#999; transition:all 0.2s; }
        .type-label input[type="radio"]:checked + span { border-color:var(--rust); color:var(--rust); background:#c0440e0d; }
        .type-label:hover span { border-color:#bbb; color:var(--ink); }
        .field { margin-bottom:20px; }
        .field label { display:block; font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:#999; margin-bottom:8px; }
        .field input, .field textarea { width:100%; border:1px solid var(--line); border-radius:2px; padding:12px 14px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:300; color:var(--ink); background:#fdfcf9; outline:none; transition:border-color 0.2s; resize:none; }
        .field input:focus, .field textarea:focus { border-color:var(--rust); background:#fff; }
        .field textarea { min-height:160px; line-height:1.7; }
        .submit-btn { width:100%; padding:14px; background:var(--rust); color:#fff; border:none; border-radius:2px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; transition:background 0.2s,transform 0.1s; }
        .submit-btn:hover { background:#a8390b; }
        .submit-btn:active { transform:scale(0.99); }
        .success-screen { text-align:center; padding:20px 0 10px; animation:fadeUp 0.5s ease both; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        .success-icon { width:64px; height:64px; border-radius:50%; background:#d8f0e7; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; }
        .success-icon svg { width:28px; height:28px; stroke:var(--success); stroke-width:2.5; fill:none; stroke-dasharray:60; stroke-dashoffset:60; animation:draw 0.5s 0.2s ease forwards; }
        @keyframes draw { to{stroke-dashoffset:0} }
        .success-screen h2 { font-family:'Playfair Display',serif; font-size:22px; color:var(--ink); margin-bottom:10px; }
        .success-screen p { font-size:13px; color:#999; font-weight:300; line-height:1.7; margin-bottom:28px; }
        .another-btn { display:inline-block; text-decoration:none; background:transparent; border:1px solid var(--line); border-radius:2px; padding:10px 24px; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:#999; transition:all 0.2s; }
        .another-btn:hover { border-color:var(--rust); color:var(--rust); }
        @media(max-width:480px) { .card{padding:40px 24px 32px} h1{font-size:22px} }
          .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 28px;
      transition: color 0.2s;
    }

    .back-btn svg {
      width: 14px;
      height: 14px;
    }

    .back-btn:hover { color: var(--rust); }
    </style>
</head>
<body>
<div class="page">
    <div class="card">

        {% if success %}
        <div class="success-screen">
            <div class="success-icon">
                <svg viewBox="0 0 24 24">
                    <polyline points="4 12 9 17 20 6"/>
                </svg>
            </div>
            <h2>Message Sent</h2>
            <p>Thank you. Your message has been<br>saved and delivered to the admin.</p>
            <a href="{% url 'feedback' %}" class="another-btn">Send Another</a>
        </div>

        {% else %}
        <div class="tag">Admin Inbox</div>
        <h1>Send a Message</h1>
        <p class="subtitle">Submit a recommendation or report a problem.<br>We read every message.</p>
        <a href="/" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Back
        </a>
        <form method="POST" action="{% url 'feedback' %}">
            {% csrf_token %}

            <div class="type-row">
                <label class="type-label">
                    <input type="radio" name="message_type" value="recommendation" checked/>
                    <span>💡 Recommendation</span>
                </label>
                <label class="type-label">
                    <input type="radio" name="message_type" value="problem"/>
                    <span>🐛 Problem Report</span>
                </label>
            </div>

            <div class="field">
                <label>Your Name <span
                        style="color:#bbb;font-style:italic;text-transform:none">(optional)</span></label>
                <input type="text" name="sender_name" placeholder="e.g. Ali Karimov" maxlength="100"/>
            </div>

            <div class="field">
                <label>Message</label>
                <textarea name="message" placeholder="Describe your recommendation or problem in detail…"
                          maxlength="2000" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>
        </form>
        {% endif %}

    </div>
</div>
</body>
</html>
