<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Signs Expressions Quiz — Fixed</title>
  <style>
    :root{--bg:#0f172a;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--success:#22c55e;--danger:#ef4444}
    *{box-sizing:border-box}
    body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071033 0%, #081126 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:900px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    h1{font-size:20px;margin:0}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6)}
    .question{font-size:18px;margin-bottom:12px}
    .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:12px}
    label.option{background:#071330;border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
    input[type=radio]{width:18px;height:18px}
    .controls{display:flex;gap:8px;align-items:center}
    button{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:#04243a;cursor:pointer;font-weight:600}
    button:disabled{background:var(--muted);cursor:not-allowed}
    button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.15)}
    .result{padding:10px;margin-top:8px;border-radius:8px;font-weight:700}
    .result.ok{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.12)}
    .result.bad{background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.06)}
    footer{margin-top:12px;color:var(--muted);font-size:13px}
    sup{font-size: 0.6em; vertical-align: super;}
    @media(max-width:520px){.options{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Signs Expressions Quiz</h1>
      <div class="meta">20 random expression questions (many formats)</div>
    </header>

    <div class="card" id="card"></div>

    <footer>
      Tip: Pay attention to parentheses and exponent precedence (exponent has higher priority than unary minus).
    </footer>
  </div>

  <script>
    const card = document.getElementById('card');
    let QUESTIONS = [], idx = 0, score = 0;
    const totalQuestions = 20;

    function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a; }
    function fmt(n){ // format integer or float nicely
      if (Number.isFinite(n) && Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
      return String(Number.parseFloat(n.toFixed(6)).toString());
    }

    function exp(base, exponent) {
        return `${base}<sup>${exponent}</sup>`;
    }

    function formatNumber(n, isFirst) {
        if (n < 0 && !isFirst) {
            return `(${n})`;
        }
        return n;
    }

    function makeQuestion(){
      const type = randInt(1,20);
      let expr = "", val = 0;
      let a, b, c, e;

      switch(type){
        case 1: { a=randInt(-20,20), b=randInt(-20,20); expr=`${formatNumber(a, true)} + ${formatNumber(b, false)}`; val = a + b; break; }
        case 2: { a=randInt(-20,20), b=randInt(-20,20); expr=`${formatNumber(a, true)} - ${formatNumber(b, false)}`; val = a - b; break; }
        case 3: { a=randInt(-12,12), b=randInt(-12,12); expr=`${formatNumber(a, true)} * ${formatNumber(b, false)}`; val = a * b; break; }
        case 4: { // division
          let denom = randInt(1,10), k = randInt(-6,6);
          if(k === 0) k = 1;
          const numer = denom * k;
          expr = `${formatNumber(numer, true)} / ${formatNumber(denom, false)}`; val = numer / denom; break;
        }
        case 5: { a=randInt(-15,15); expr=`-(${a})`; val = -(a); break; }
        case 6: { a=randInt(-15,15); expr=`-(${a})`; val = -(a); break; }
        case 7: { a=randInt(-5,5), e=2; expr=`(${a})<sup>${e}</sup>`; val = Math.pow(a,e); break; }
        case 8: { b=randInt(2,5), e=2; expr = `-${b}<sup>${e}</sup>`; val = -(Math.pow(b,e)); break; }
        case 9: { b=randInt(2,5), e=2; expr = `(-${b})<sup>${e}</sup>`; val = Math.pow(-b,e); break; }
        case 10: { b=randInt(2,5), e=2; expr = `-(-${b}<sup>${e}</sup>)`; val = Math.pow(b,e); break; }
        case 11: { a=randInt(-6,6), b=randInt(-6,6), c=randInt(-6,6); expr=`(${formatNumber(a, true)} + ${formatNumber(b, false)}) * ${formatNumber(c, false)}`; val = (a+b)*c; break; }
        case 12: { a=randInt(-6,6), b=randInt(-6,6), c=randInt(-6,6); expr=`${formatNumber(a, true)} * (${formatNumber(b, true)} - ${formatNumber(c, false)})`; val = a*(b-c); break; }
        case 13: {
          a=randInt(-8,8), b=randInt(-8,8);
          let diff = a - b;
          let divisors = [];
          for(let d=1; d<=Math.abs(diff)||d<=1; d++){
            if(d===0) continue;
            if(diff % d === 0) divisors.push(d);
            if(diff % -d === 0) divisors.push(-d);
          }
          c = 1;
          if(divisors.length) c = divisors[Math.floor(Math.random()*divisors.length)];
          expr = `(${formatNumber(a, true)} - ${formatNumber(b, false)}) / ${formatNumber(c, false)}`; val = (a - b) / c; break;
        }
        case 14: { a=randInt(-5,5), e=randInt(2,3), b=randInt(-5,5); expr=`(${a})<sup>${e}</sup> + ${formatNumber(b, false)}`; val = Math.pow(a,e) + b; break; }
        case 15: { a=randInt(-6,6), b=randInt(-4,4), e=randInt(2,3); expr=`${formatNumber(a, true)} * (${formatNumber(b, true)})<sup>${e}</sup>`; val = a * Math.pow(b,e); break; }
        case 16: { a=randInt(-4,4), b=randInt(-4,4), c=randInt(-6,6); expr=`(${formatNumber(a, true)} + ${formatNumber(b, false)})<sup>2</sup> - ${formatNumber(c, false)}`; val = Math.pow(a+b,2) - c; break; }
        case 17: { a=randInt(-5,5), b=randInt(-5,5), c=randInt(-5,5); expr=`-(${formatNumber(a, true)} + ${formatNumber(b, false)} + ${formatNumber(c, false)})`; val = -(a+b+c); break; }
        case 18: { a=randInt(-6,6), b=randInt(-4,4); expr=`${formatNumber(a, true)} * (${formatNumber(b, false)})<sup>2</sup>`; val = a * Math.pow(b,2); break; }
        case 19: { a=randInt(-8,8), b=randInt(-8,8); expr=`${formatNumber(a, true)} * ${formatNumber(b, false)}`; val = a * b; break; }
        case 20: { a=randInt(-6,6), b=randInt(-6,6); expr=`${formatNumber(a, true)} - ${formatNumber(b, false)}`; val = a - b; break; }
        default: { expr = "0"; val = 0; break; }
      }

      const valStr = fmt(val);

      const correct = valStr;
      const opts = new Set([correct]);
      while(opts.size < 3){
        let delta = randInt(1,5);
        if(Math.random() < 0.3) {
          let fake = (Number(correct) || 0) + delta;
          opts.add(fmt(fake));
        } else if(Math.random() < 0.6) {
          let fake = (Number(correct) || 0) - delta;
          opts.add(fmt(fake));
        } else {
          let fake = (Number(correct) || 0) * -1;
          opts.add(fmt(fake));
        }
      }

      const options = shuffle(Array.from(opts));

      return { expr, answer: correct, options };
    }

    function startQuiz(){
      idx=0; score=0;
      QUESTIONS = Array.from({length: totalQuestions}, ()=> makeQuestion());
      render();
    }

    function render(){
      const q = QUESTIONS[idx];
      card.innerHTML = `
        <div class="question">Q${idx+1}: Calculate <strong>${q.expr}</strong></div>
        <div class="options">${q.options.map(o=>`<label class="option"><input type="radio" name="opt" value="${o}"> ${o}</label>`).join('')}</div>
        <div class="controls">
          <button id="check">Check</button>
          <button class="secondary" id="skipBtn">Skip</button>
          <button class="secondary"><a style="text-decoration:none; color: #60a5fa" href="{% url 'working_with_signs' %}">Exit</a></button>
          <div style="flex:1"></div>
          <div class="meta">${idx+1}/${totalQuestions}</div>
        </div>
        <div id="feedback"></div>
      `;
      document.getElementById('check').addEventListener('click', ()=> check(q));
      document.getElementById('skipBtn').addEventListener('click', next);
    }

    function check(q){
      const sel = document.querySelector('input[name=opt]:checked');
      const fb = document.getElementById('feedback');
      document.getElementById('check').disabled = true;
      if(!sel){ fb.innerHTML = `<div class="result bad">⚠️ Please select an option.</div>`; return; }
      const val = sel.value;
      if(val === q.answer){
        score++;
        fb.innerHTML = `<div class="result ok">✅ Correct!</div>`;
        document.getElementById('skipBtn').removeEventListener('click', next);
        document.getElementById('skipBtn').disabled = true;
        setTimeout(next, 800);
      } else {
        fb.innerHTML = `<div class="result bad">❌ Incorrect. Correct: ${q.answer}</div>`;
        document.getElementById('skipBtn').textContent = 'Next';
        document.getElementById('skipBtn').id = 'nextBtn';
        document.getElementById('nextBtn').addEventListener('click', next);
      }
    }

    function next(){
      if(idx < totalQuestions - 1){ idx++; render(); }
      else showResults();
    }

    function showResults(){
      const perc = Math.round((score/totalQuestions)*100);
      card.innerHTML = `
        <div class="question">Test completed!</div>
        <div class="result ok" style="text-align:center;font-size:18px;margin-bottom:12px;">
          Your result: ${score}/${totalQuestions} (${perc}%)
        </div>
        <div style="text-align:center;">${perc >= 80 ? "Excellent! 👍" : perc >= 50 ? "Good, keep practising! 😊" : "Keep practicing — you got this! 📚"}</div>
        <div class="controls" style="justify-content:center;margin-top:12px;">
          <button id="restart">Retry</button>
          <button><a style="text-decoration: none; color:black;" href="{% url 'working_with_signs' %}">Exit</a></button>
        </div>
      `;
      document.getElementById('restart').addEventListener('click', startQuiz);
    }

    startQuiz();
  </script>
</body>
</html>
