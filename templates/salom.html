<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fraction with CSS</title>
  <style>
    .fraction {
      display: inline-block;
      text-align: center;
    }
    .fraction span {
      display: block;
      padding: 0 4px;
    }
    .fraction .top {
      border-bottom: 1px solid #000;
    }
    .fraction .bottom {
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <p>Natija:
    <span class="fraction">
      <span class="top">3</span>
      <span class="bottom">4</span>
    </span>
  </p>
</body>
</html>
