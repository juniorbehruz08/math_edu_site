<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Linear Functions Quiz</title>
  <style>
    :root{--bg:#0f172a;--card:#0b1220;--muted:#9aa4b2;--accent:#60a5fa;--success:#22c55e;--danger:#ef4444}
    *{box-sizing:border-box}
    body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071033 0%, #081126 100%);color:#e6eef8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{width:100%;max-width:900px}
    header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    h1{font-size:20px;margin:0}
    .card{background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));border:1px solid rgba(255,255,255,0.03);padding:18px;border-radius:12px;box-shadow:0 8px 30px rgba(2,6,23,0.6)}
    .question{font-size:18px;margin-bottom:12px}
    .meta{color:var(--muted);font-size:13px;margin-bottom:12px}
    .options{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:12px}
    label.option{background:#071330;border:1px solid rgba(255,255,255,0.03);padding:10px;border-radius:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
    input[type=radio]{width:18px;height:18px}
    .controls{display:flex;gap:8px;align-items:center}
    button{background:var(--accent);border:none;padding:10px 14px;border-radius:10px;color:#04243a;cursor:pointer;font-weight:600}
    button:disabled{background:var(--muted);cursor:not-allowed}
    button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(96,165,250,0.15)}
    .result{padding:10px;margin-top:8px;border-radius:8px;font-weight:700}
    .result.ok{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.12)}
    .result.bad{background:rgba(239,68,68,0.08);color:var(--danger);border:1px solid rgba(239,68,68,0.06)}
    footer{margin-top:12px;color:var(--muted);font-size:13px}
    .frac sup{display:block;text-align:center;font-size:0.8em}
    .frac sub{display:block;text-align:center;font-size:0.8em}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Linear Functions Quiz</h1>
      <div class="meta">20 random linear function questions</div>
    </header>

    <div class="card" id="card"></div>

    <footer>
      Tip: Recall y = mx + b form. "m" is slope, "b" is intercept.
    </footer>
  </div>

  <script>
    const card = document.getElementById('card');
    let QUESTIONS = [], idx = 0, score = 0;
    const totalQuestions = 20;

    function randInt(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]] } return a; }

    // GCD
    function gcd(a,b){ return b ? gcd(b, a % b) : Math.abs(a); }

    // Sonni kasr formatida chiqarish
    function formatFrac(num){
      if(Number.isInteger(num)) return String(num);
      let den = 1000000, nume = Math.round(num*den);
      let g = gcd(nume, den);
      nume /= g; den /= g;
      if(den>50) return num.toFixed(2);
      return `<span class="frac"><sup>${nume}</sup>/<sub>${den}</sub></span>`;
    }

    // Ifodani formatlash: y=mx+b
    function formatExpr(m,b){
      let mPart = "";
      if(m===0) mPart="";
      else if(m===1) mPart="x";
      else if(m===-1) mPart="-x";
      else mPart=`${m}x`;

      let bPart="";
      if(b>0) bPart=`+${b}`;
      else if(b<0) bPart=`${b}`;
      return `y=${mPart}${bPart}`;
    }

    function makeQuestion(){
      const type = randInt(1,3);
      let expr="", answer="", options=[];

      if(type===1){
        // Intersection
        let m1=randInt(-5,5), b1=randInt(-5,5);
        let m2=m1; while(m2===m1){ m2=randInt(-5,5);}
        let b2=randInt(-5,5);

        let x=(b2-b1)/(m1-m2);
        let y=m1*x+b1;
        expr=`Find intersection of ${formatExpr(m1,b1)} and ${formatExpr(m2,b2)}`;
        answer=`(${formatFrac(x)}, ${formatFrac(y)})`;

        options=new Set([answer]);
        while(options.size<3){
          let fx=randInt(-5,5), fy=randInt(-5,5);
          options.add(`(${formatFrac(fx)}, ${formatFrac(fy)})`);
        }
        options=shuffle(Array.from(options));
      }
      else if(type===2){
        // Value at x
        let m=randInt(-5,5), b=randInt(-5,5), x=randInt(-5,5);
        let y=m*x+b;
        expr=`Find y for ${formatExpr(m,b)} at x=${x}`;
        answer=formatFrac(y);

        options=new Set([answer]);
        while(options.size<3){
          options.add(formatFrac(y+randInt(-5,5)));
        }
        options=shuffle(Array.from(options));
      }
      else if(type===3){
        // Slope
        let m=randInt(-5,5), b=randInt(-5,5);
        expr=`What is the slope of ${formatExpr(m,b)}?`;
        answer=String(m);

        options=new Set([answer]);
        while(options.size<3){
          options.add(String(randInt(-5,5)));
        }
        options=shuffle(Array.from(options));
      }

      return {expr, answer, options};
    }

    function startQuiz(){
      idx=0; score=0;
      QUESTIONS = Array.from({length: totalQuestions}, ()=> makeQuestion());
      render();
    }

    function render(){
      const q = QUESTIONS[idx];
      card.innerHTML = `
        <div class="question">Q${idx+1}: ${q.expr}</div>
        <div class="options">${q.options.map(o=>`<label class="option"><input type="radio" name="opt" value="${o}"> <span>${o}</span></label>`).join('')}</div>
        <div class="controls">
          <button id="check">Check</button>
          <button class="secondary" id="skipBtn">Skip</button>
          <div style="flex:1"></div>
          <div class="meta">${idx+1}/${totalQuestions}</div>
        </div>
        <div id="feedback"></div>
      `;
      document.getElementById('check').addEventListener('click', ()=> check(q));
      document.getElementById('skipBtn').addEventListener('click', next);
    }

    function check(q){
      const sel=document.querySelector('input[name=opt]:checked');
      const fb=document.getElementById('feedback');
      document.getElementById('check').disabled=true;
      if(!sel){ fb.innerHTML=`<div class="result bad">⚠️ Please select an option.</div>`; return; }
      if(sel.value===q.answer){
        score++;
        fb.innerHTML=`<div class="result ok">✅ Correct!</div>`;
        setTimeout(next, 800);
      } else {
        fb.innerHTML=`<div class="result bad">❌ Incorrect. Correct: ${q.answer}</div>`;
      }
    }

    function next(){
      if(idx<totalQuestions-1){ idx++; render(); }
      else showResults();
    }

    function showResults(){
      const perc=Math.round((score/totalQuestions)*100);
      card.innerHTML=`
        <div class="question">Test completed!</div>
        <div class="result ok" style="text-align:center;font-size:18px;margin-bottom:12px;">
          Your result: ${score}/${totalQuestions} (${perc}%)
        </div>
        <div style="text-align:center;">${perc>=80?"Excellent! 👍":perc>=50?"Good job! 😊":"Keep practicing 📚"}</div>
        <div class="controls" style="justify-content:center;margin-top:12px;">
          <button id="restart">Retry</button>
        </div>
      `;
      document.getElementById('restart').addEventListener('click', startQuiz);
    }

    startQuiz();
  </script>
</body>
</html>
